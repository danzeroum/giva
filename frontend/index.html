<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>GIVA — Enriquecedor NCM/ICMS</title>
    <script>
      // Aplica o tema salvo antes do primeiro paint (evita flash). 'system' (ou
      // ausência de valor) deixa o @media (prefers-color-scheme) decidir. Mesma
      // chave usada pelo store (src/store/app.ts -> applyTheme).
      (function () {
        try {
          var t = localStorage.getItem('giva-theme')
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t)
          }
        } catch (e) {
          /* localStorage indisponível — segue o tema do sistema */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
